name: Build & Push Frontend Image

# Se ejecuta en cada push a main — construye la imagen del frontend
# en GitHub Actions (7GB RAM disponibles) y la sube a GHCR.
# El servidor solo hace "docker pull", eliminando el OOM durante el deploy.
on:
  push:
    branches: [main]
    paths:
      - 'components/**'
      - 'pages/**'
      - 'services/**'
      - 'utils/**'
      - 'types/**'
      - 'constants.tsx'
      - 'App.tsx'
      - 'index.html'
      - 'package.json'
      - 'vite.config.ts'
      - 'tailwind.config.*'
      - 'Dockerfile.frontend'
      - 'nginx.conf'
      - '.github/workflows/build-frontend.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/m7-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extraer metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build y Push imagen frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # Hace el paquete público automáticamente para que Coolify pueda
      # hacer docker pull sin necesidad de credenciales.
      - name: Hacer paquete público en GHCR
        run: |
          PACKAGE_NAME="m7-frontend"
          curl -s -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/user/packages/container/${PACKAGE_NAME}" \
            -d '{"visibility":"public"}' | cat
