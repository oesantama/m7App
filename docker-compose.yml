services:
  m7app-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - AI_MODEL=${AI_MODEL}
      # Reducido a 768M para dejar margen a postgres y evolution en gota básica
      - NODE_OPTIONS=--max-old-space-size=768
      - RCLONE_CONFIG_GDRIVE_CUMPLIDOS_TYPE=drive
      - RCLONE_CONFIG_GDRIVE_CUMPLIDOS_CLIENT_ID=410862023458-6ca0s3t1ao45ihl4mupodbvugg1gbufo.apps.googleusercontent.com
      - RCLONE_CONFIG_GDRIVE_CUMPLIDOS_CLIENT_SECRET=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
      - RCLONE_CONFIG_GDRIVE_CUMPLIDOS_SCOPE=drive
      - 'RCLONE_CONFIG_GDRIVE_CUMPLIDOS_TOKEN={"access_token":"ya29.a0AQvPyINyMiVK9BqykFhW5vMbP-7fX16REtrfsl7rOH_LYNmd52k2V2W7WxEKBCvtpukRbSMEUK9mjDeyySxcnobwqAx71Lapvtm5M-S8JybDdRQq5qW2rD6PUSmXex2fMQfzHMtU5xquCLzyHarBk_LdSgV9rtQHsy5QVmV1frLHE9c405ZZlK0Heu1hvbzCp3LYopcaCgYKAYQSARQSFQHGX2Mis4O4rn496LKSLmPZuHj8Pg0206","token_type":"Bearer","refresh_token":"1//05hSCjSte2j4ECgYIARAAGAUSNwF-L9Ir0yWdyc2TO43xc8vby6F0R_7kPo5QLNb7gqwhH2u9-X0v6wTNgQGyg9VhZrk3ws--Gl0","expiry":"2026-05-01T00:28:42.595243355-05:00","expires_in":3599}'
    env_file:
      - .env
    volumes:
      - .env:/app/.env
      - ./.wwebjs_auth:/app/.wwebjs_auth
      - /app/node_modules
    restart: always
    deploy:
      resources:
        limits:
          memory: 800M
    # Healthcheck: espera 60s para que migraciones terminen antes de recibir tráfico
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ready || exit 1"]
      interval: 10s
      timeout: 8s
      retries: 8
      start_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - m7-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      m7app-backend:
        condition: service_healthy
    restart: always
    networks:
      - m7-network
    environment:
      - VITE_API_URL=/api
    ports:
      - "3000:80"

