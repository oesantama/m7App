services:
  m7app-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8090:8080"
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    volumes:
      - .env:/app/.env
      - ./.wwebjs_auth:/app/.wwebjs_auth
      - /app/node_modules
    restart: always
    networks:
      - m7-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - m7app-backend
    restart: always
    networks:
      - m7-network
    environment:
      - VITE_API_URL=/api
    ports:
      - "3000:80"

  evolution:
    image: atendai/evolution-api:v1.8.2
    container_name: m7-evolution
    restart: always
    ports:
      - "8081:8080"
    environment:
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-B3B896F8-9862-4467-9C17-A038848C1726}
      - SERVER_URL=${EVOLUTION_API_URL:-http://localhost:8081}
      - DOCKER_ENV=true
      - LOG_LEVEL=error
      - DEL_INSTANCE=false
      - STORE_MESSAGES=true
      - STORE_MESSAGE_UP=true
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    networks:
      - m7-network

  postgres:
    image: postgres:15-alpine
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=m7_admin
      - POSTGRES_PASSWORD=m7_master_password
      - POSTGRES_DB=m7_logistica
    volumes:
      - m7_logistica_data:/var/lib/postgresql/data
    networks:
      - m7-network

networks:
  m7-network:
    driver: bridge

volumes:
  m7_logistica_data:
  evolution_instances:
  evolution_store:
