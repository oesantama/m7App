  postgres:
    image: postgres:15-alpine
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=m7_admin
      - POSTGRES_PASSWORD=m7_master_password
      - POSTGRES_DB=m7_logistica
    volumes:
      - m7_logistica_data:/var/lib/postgresql/data
    # Limitar memoria de postgres para no ahogar a los otros contenedores
    deploy:
      resources:
        limits:
          memory: 350M
    command: >
      postgres
      -c shared_buffers=64MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c max_connections=50
      -c effective_cache_size=128MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U m7_admin -d m7_logistica"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - m7-network

  # ─── Backup automático de Postgres ───────────────────────────────────────────
  # Corre pg_dump cada día a las 2:00 AM (America/Bogota)
  # Mantiene los últimos 7 días de backups en el volumen m7_backups
  # Para restaurar manualmente: docker exec m7-backup ls /backups
  db-backup:
    image: postgres:15-alpine
    container_name: m7-backup
    restart: always
    environment:
      - PGPASSWORD=m7_master_password
      - TZ=America/Bogota
      - RCLONE_CONFIG_GDRIVE_CUMPLIDOS_TYPE=drive
      - RCLONE_CONFIG_GDRIVE_CUMPLIDOS_CLIENT_ID=410862023458-6ca0s3t1ao45ihl4mupodbvugg1gbufo.apps.googleusercontent.com
      - RCLONE_CONFIG_GDRIVE_CUMPLIDOS_CLIENT_SECRET=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
      - RCLONE_CONFIG_GDRIVE_CUMPLIDOS_SCOPE=drive
      - 'RCLONE_CONFIG_GDRIVE_CUMPLIDOS_TOKEN={"access_token":"ya29.a0AQvPyINyMiVK9BqykFhW5vMbP-7fX16REtrfsl7rOH_LYNmd52k2V2W7WxEKBCvtpukRbSMEUK9mjDeyySxcnobwqAx71Lapvtm5M-S8JybDdRQq5qW2rD6PUSmXex2fMQfzHMtU5xquCLzyHarBk_LdSgV9rtQHsy5QVmV1frLHE9c405ZZlK0Heu1hvbzCp3LYopcaCgYKAYQSARQSFQHGX2Mis4O4rn496LKSLmPZuHj8Pg0206","token_type":"Bearer","refresh_token":"1//05hSCjSte2j4ECgYIARAAGAUSNwF-L9Ir0yWdyc2TO43xc8vby6F0R_7kPo5QLNb7gqwhH2u9-X0v6wTNgQGyg9VhZrk3ws--Gl0","expiry":"2026-05-01T00:28:42.595243355-05:00","expires_in":3599}'
    volumes:
      - m7_backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - m7-network
    deploy:
      resources:
        limits:
          memory: 256M
    # Cron: dump cada 12h + subida a Drive + limpieza local (3 días)
    entrypoint: >
      sh -c "
        apk add --no-cache rclone;
        echo '[M7-BACKUP] Servicio iniciado (Ciclo: 15:00 y 01:00 | Retención Local: 3d)';
        
        # Función de ejecución de backup
        do_backup() {
          BACKUP_FILE=/backups/m7_logistica_$$(date +%Y%m%d_%H%M%S).sql.gz;
          pg_dump -h postgres -U m7_admin -d m7_logistica | gzip > $$BACKUP_FILE;
          echo \"[M7-BACKUP] Backup local creado: $$BACKUP_FILE\";
          
          echo \"[M7-BACKUP] Sincronizando con Google Drive (GDRIVE_CUMPLIDOS)...\";
          # Usamos el remoto configurado vía variables de entorno
          rclone copy $$BACKUP_FILE gdrive_cumplidos:m7_backups;
          
          if [ $$? -eq 0 ]; then
            echo \"[M7-BACKUP] Sincronización completada exitosamente\";
          else
            echo \"[M7-BACKUP] ERROR: Falló la sincronización con rclone\";
          fi
          
          find /backups -name '*.sql.gz' -mtime +3 -delete;
        }

        # Ejecución inmediata al arrancar
        echo '[M7-BACKUP] Ejecutando backup inicial de seguridad...';
        do_backup;

        while true; do
          CURRENT_HOUR=$$(date +%H);
          if [ \"$$CURRENT_HOUR\" = \"01\" ] || [ \"$$CURRENT_HOUR\" = \"15\" ]; then
            echo \"[M7-BACKUP] Hora programada detectada ($$CURRENT_HOUR:00). Ejecutando...\";
            do_backup;
            echo '[M7-BACKUP] Limpieza realizada. Durmiendo 50 min para evitar duplicados.';
            sleep 3000;
          fi
          sleep 60;
        done
      "
  # ─────────────────────────────────────────────────────────────────────────────

networks:
  m7-network:
    driver: bridge

volumes:
  m7_logistica_data:
#  evolution_instances:
#  evolution_store:
  m7_backups:    # Volumen persistente para backups diarios
