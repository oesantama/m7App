services:
  m7app-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - AI_MODEL=${AI_MODEL}
    env_file:
      - .env
    volumes:
      - .env:/app/.env
      - ./.wwebjs_auth:/app/.wwebjs_auth
      - /app/node_modules
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - m7-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - m7app-backend
    restart: always
    networks:
      - m7-network
    environment:
      - VITE_API_URL=/api
    ports:
      - "3000:80"

  evolution:
    image: atendai/evolution-api:v1.8.2
    container_name: m7-evolution
    restart: always
    ports:
      - "8081:8080"
    environment:
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-B3B896F8-9862-4467-9C17-A038848C1726}
      - SERVER_URL=${EVOLUTION_API_URL:-http://localhost:8081}
      - DOCKER_ENV=true
      - LOG_LEVEL=error
      - DEL_INSTANCE=false
      - STORE_MESSAGES=true
      - STORE_MESSAGE_UP=true
      - DATABASE_ENABLED=true
      - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER:-m7_admin}:${POSTGRES_PASSWORD:-m7_master_password}@postgres:5432/${POSTGRES_DB:-m7_logistica}?sslmode=disable
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
    deploy:
      resources:
        limits:
          memory: 512M
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    depends_on:
      - postgres
    networks:
      - m7-network

  postgres:
    image: postgres:15-alpine
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=m7_admin
      - POSTGRES_PASSWORD=m7_master_password
      - POSTGRES_DB=m7_logistica
    volumes:
      - m7_logistica_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U m7_admin -d m7_logistica"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - m7-network

networks:
  m7-network:
    driver: bridge

volumes:
  m7_logistica_data:
  evolution_instances:
  evolution_store:
