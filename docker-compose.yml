services:
  m7app-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - AI_MODEL=${AI_MODEL}
      # Reducido a 768M para dejar margen a postgres y evolution en gota básica
      - NODE_OPTIONS=--max-old-space-size=768
    env_file:
      - .env
    volumes:
      - .env:/app/.env
      - ./.wwebjs_auth:/app/.wwebjs_auth
      - /app/node_modules
    restart: always
    deploy:
      resources:
        limits:
          memory: 800M
    # Healthcheck: espera 60s para que migraciones terminen antes de recibir tráfico
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ready || exit 1"]
      interval: 10s
      timeout: 8s
      retries: 8
      start_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - m7-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      m7app-backend:
        condition: service_healthy
    restart: always
    networks:
      - m7-network
    environment:
      - VITE_API_URL=/api
    ports:
      - "3000:80"

  evolution:
    image: atendai/evolution-api:v1.8.2
    container_name: m7-evolution
    restart: always
    ports:
      - "8081:8080"
    environment:
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-B3B896F8-9862-4467-9C17-A038848C1726}
      # SERVER_URL: URL pública de Evolution (usada para QR y webhooks)
      # Debe ser la URL externa real del servidor, no localhost
      - SERVER_URL=${EVOLUTION_SERVER_URL:-https://orbitm7.m7apps.com}
      - DOCKER_ENV=true
      - LOG_LEVEL=error
      - DEL_INSTANCE=false
      - STORE_MESSAGES=true
      - STORE_MESSAGE_UP=true
      - DATABASE_ENABLED=true
      - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER:-m7_admin}:${POSTGRES_PASSWORD:-m7_master_password}@postgres:5432/${POSTGRES_DB:-m7_logistica}?sslmode=disable
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
    deploy:
      resources:
        limits:
          memory: 512M
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - m7-network

  postgres:
    image: postgres:15-alpine
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=m7_admin
      - POSTGRES_PASSWORD=m7_master_password
      - POSTGRES_DB=m7_logistica
    volumes:
      - m7_logistica_data:/var/lib/postgresql/data
    # Limitar memoria de postgres para no ahogar a los otros contenedores
    deploy:
      resources:
        limits:
          memory: 350M
    command: >
      postgres
      -c shared_buffers=64MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c max_connections=50
      -c effective_cache_size=128MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U m7_admin -d m7_logistica"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - m7-network

networks:
  m7-network:
    driver: bridge

volumes:
  m7_logistica_data:
  evolution_instances:
  evolution_store:
