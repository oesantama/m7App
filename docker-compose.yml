services:
  m7app-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8090:8080"
    volumes:
      - ./.wwebjs_auth:/app/.wwebjs_auth
    env_file:
      - .env
    depends_on:
      - evolution-api
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3010:80"
    depends_on:
      - m7app-backend
    restart: always

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: m7-evolution-api
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      - SERVER_URL=${EVO_API_URL:-http://localhost:8080}
      - AUTH_PROVIDER=apikey
      - AUTH_API_KEY=422A978DE701-44B0-A2B2-D3D6C22765A1
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:evolution@postgres:5432/evolution
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_exchange
      - LOG_LEVEL=ERROR
      - LOG_COLOR=true
    volumes:
      - m7_evolution_instances:/evolution/instances

  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=evolution
      - POSTGRES_DB=evolution
    volumes:
      - m7_evolution_db:/var/lib/postgresql/data

volumes:
  m7_evolution_instances:
  m7_evolution_db:
