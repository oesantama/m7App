<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>M7 - Gestión Logística</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap");
      body {
        font-family: "Inter", sans-serif;
        margin: 0;
        padding: 0;
      }
      .leaflet-container {
        width: 100%;
        height: 500px;
        border-radius: 1.5rem;
        z-index: 1;
      }

      /* Custom scrollbar para estética premium */
      .custom-scrollbar::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #f1f5f9;
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #94a3b8;
        border-radius: 10px;
        border: 2px solid #f1f5f9;
      }
      /* M7 PREMIUM MAP STYLES */
      .leaflet-popup-content-wrapper {
        background: transparent !important;
        box-shadow: none !important;
        padding: 0 !important;
      }
      .leaflet-popup-content {
        margin: 0 !important;
        width: auto !important;
      }
      .leaflet-popup-tip-container {
        display: none !important;
      }
      .m7-premium-popup, .vehicle-premium-popup {
        filter: drop-shadow(0 20px 25px rgba(0,0,0,0.2));
      }
      .custom-m7-pin, .custom-vehicle-icon {
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      .custom-m7-pin:hover, .custom-vehicle-icon:hover {
        z-index: 9999 !important;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@19.0.0",
          "react-dom": "https://esm.sh/react-dom@19.0.0",
          "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
          "@google/genai": "https://esm.sh/@google/genai@1.3.0",
          "leaflet": "https://esm.sh/leaflet@1.9.4",
          "xlsx": "https://esm.sh/xlsx@0.18.5",
          "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
          "react/": "https://esm.sh/react@^19.2.3/",
          "dotenv": "https://esm.sh/dotenv@^17.2.3",
          "express": "https://esm.sh/express@^5.2.1",
          "cors": "https://esm.sh/cors@^2.8.5",
          "pg": "https://esm.sh/pg@^8.17.2"
        }
      }
    </script>
  </head>
  <body class="bg-slate-50 text-slate-900">
    <div id="root"></div>
    <script type="module" src="index.tsx" defer></script>
  </body>
</html>
