services:
  m7-evolution:
    image: atendai/evolution-api:v2.2.3
    restart: always
    expose:
      - '8080'
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    environment:
      - SERVER_URL=https://evolution.m7apps.com
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      # Base de datos — usa el mismo postgres del proyecto
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@m7-postgres:5432/${POSTGRES_DB}
      # Solo guarda estado de instancias (NO mensajes ni contactos — evita llenar la BD)
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=false
      - DATABASE_SAVE_MESSAGE_UPDATE=false
      - DATABASE_SAVE_DATA_CONTACTS=false
      - DATABASE_SAVE_DATA_CHATS=false
      - DATABASE_SAVE_DATA_LABELS=false
      - DATABASE_SAVE_DATA_HISTORIC=false
      - QRCODE_LIMIT=30
      - DEL_INSTANCE=false
      - LOG_LEVEL=ERROR
      - TZ=America/Bogota
      - CONFIG_SESSION_PHONE_VERSION=
    networks:
      m7-network:
        aliases:
          - evolution
      coolify:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.m7-evolution.rule=Host(`evolution.m7apps.com`)"
      - "traefik.http.routers.m7-evolution.entrypoints=https"
      - "traefik.http.routers.m7-evolution.tls=true"
      - "traefik.http.services.m7-evolution.loadbalancer.server.port=8080"
    mem_limit: 512m
    memswap_limit: 512m

  m7app-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: always
    expose:
      - '8080'
    networks:
      - m7-network
      - coolify
    environment:
      - PORT=8080
      - DB_HOST=m7-postgres
      - DB_PORT=5432
      - 'DB_USER=${POSTGRES_USER}'
      - 'DB_PASS=${POSTGRES_PASSWORD}'
      - 'DB_NAME=${POSTGRES_DB}'
      - NODE_ENV=production
      - 'GEMINI_API_KEY=${GEMINI_API_KEY}'
      - 'GOOGLE_API_KEY=${GOOGLE_API_KEY}'
      - 'AI_MODEL=${AI_MODEL}'
      # RCLONE — proyecto OAuth 410862023458 (Drive de Cumplidos — requiere Drive API habilitada)
      - RCLONE_CONFIG_GDRIVE_CUMPLIDOS_TYPE=drive
      - RCLONE_CONFIG_GDRIVE_CUMPLIDOS_CLIENT_ID=410862023458-6ca0s3t1ao45ihl4mupodbvugg1gbufo.apps.googleusercontent.com
      - RCLONE_CONFIG_GDRIVE_CUMPLIDOS_CLIENT_SECRET=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
      - RCLONE_CONFIG_GDRIVE_CUMPLIDOS_SCOPE=drive
      - 'RCLONE_CONFIG_GDRIVE_CUMPLIDOS_TOKEN={"access_token":"ya29.a0AQvPyINyMiVK9BqykFhW5vMbP-7fX16REtrfsl7rOH_LYNmd52k2V2W7WxEKBCvtpukRbSMEUK9mjDeyySxcnobwqAx71Lapvtm5M-S8JybDdRQq5qW2rD6PUSmXex2fMQfzHMtU5xquCLzyHarBk_LdSgV9rtQHsy5QVmV1frLHE9c405ZZlK0Heu1hvbzCp3LYopcaCgYKAYQSARQSFQHGX2Mis4O4rn496LKSLmPZuHj8Pg0206","token_type":"Bearer","refresh_token":"1//05hSCjSte2j4ECgYIARAAGAUSNwF-L9Ir0yWdyc2TO43xc8vby6F0R_7kPo5QLNb7gqwhH2u9-X0v6wTNgQGyg9VhZrk3ws--Gl0","expiry":"2026-05-01T00:28:42.595243355-05:00","expires_in":3599}'
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.m7app-backend.rule=Host(`apiapps.m7apps.com`)"
      - "traefik.http.services.m7app-backend.loadbalancer.server.port=8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 1g
    memswap_limit: 1g

  frontend:
    image: 'ghcr.io/oesantama/m7-frontend:latest'
    pull_policy: always
    restart: always
    expose:
      - '80'
    networks:
      - m7-network
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.m7app-frontend.rule=Host(`orbitm7.m7apps.com`)"
      - "traefik.http.routers.m7app-frontend.entrypoints=https"
      - "traefik.http.routers.m7app-frontend.tls=true"
      - "traefik.http.services.m7app-frontend.loadbalancer.server.port=80"
    depends_on:
      m7app-backend:
        condition: service_started
    mem_limit: 128m
    memswap_limit: 128m

  postgres:
    image: 'postgres:15-alpine'
    restart: always
    command: "postgres -c shared_buffers=512MB -c work_mem=8MB -c maintenance_work_mem=128MB -c max_connections=100 -c effective_cache_size=2GB -c checkpoint_completion_target=0.9 -c wal_buffers=16MB -c synchronous_commit=off -c max_parallel_workers_per_gather=2\n"
    environment:
      - 'POSTGRES_USER=${POSTGRES_USER}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD}'
      - 'POSTGRES_DB=${POSTGRES_DB}'
    volumes:
      - 'm7_logistica_data:/var/lib/postgresql/data'
      - './database/seed:/docker-entrypoint-initdb.d'
    networks:
      m7-network:
        aliases:
          - m7-postgres
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}'
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: 1500m
    memswap_limit: 1500m

  db-backup:
    image: 'postgres:15-alpine'
    container_name: m7-backup
    restart: always
    environment:
      - 'PGPASSWORD=${POSTGRES_PASSWORD}'
      - 'POSTGRES_USER=${POSTGRES_USER}'
      - 'POSTGRES_DB=${POSTGRES_DB}'
      - TZ=America/Bogota
      - RCLONE_CONFIG_GDRIVE_CUMPLIDOS_TYPE=drive
      - RCLONE_CONFIG_GDRIVE_CUMPLIDOS_CLIENT_ID=410862023458-6ca0s3t1ao45ihl4mupodbvugg1gbufo.apps.googleusercontent.com
      - RCLONE_CONFIG_GDRIVE_CUMPLIDOS_CLIENT_SECRET=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
      - RCLONE_CONFIG_GDRIVE_CUMPLIDOS_SCOPE=drive
      - 'RCLONE_CONFIG_GDRIVE_CUMPLIDOS_TOKEN={"access_token":"ya29.a0AQvPyINyMiVK9BqykFhW5vMbP-7fX16REtrfsl7rOH_LYNmd52k2V2W7WxEKBCvtpukRbSMEUK9mjDeyySxcnobwqAx71Lapvtm5M-S8JybDdRQq5qW2rD6PUSmXex2fMQfzHMtU5xquCLzyHarBk_LdSgV9rtQHsy5QVmV1frLHE9c405ZZlK0Heu1hvbzCp3LYopcaCgYKAYQSARQSFQHGX2Mis4O4rn496LKSLmPZuHj8Pg0206","token_type":"Bearer","refresh_token":"1//05hSCjSte2j4ECgYIARAAGAUSNwF-L9Ir0yWdyc2TO43xc8vby6F0R_7kPo5QLNb7gqwhH2u9-X0v6wTNgQGyg9VhZrk3ws--Gl0","expiry":"2026-05-01T00:28:42.595243355-05:00","expires_in":3599}'
    volumes:
      - 'm7_backups:/backups'
    networks:
      - m7-network
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: >
      sh -c "
        apk add --no-cache rclone;
        echo '[M7-BACKUP] Servicio iniciado (Modo: GDRIVE_CUMPLIDOS)';
        
        do_backup() {
          BACKUP_FILE=/backups/m7_logistica_$$(date +%Y%m%d_%H%M%S).sql.gz;
          pg_dump -h m7-postgres -U ${POSTGRES_USER} -d ${POSTGRES_DB} | gzip > $$BACKUP_FILE;
          echo \"[M7-BACKUP] Backup creado. Sincronizando...\";
          rclone copy $$BACKUP_FILE gdrive_cumplidos:m7_backups -v;
          find /backups -name '*.sql.gz' -mtime +3 -delete;
        }

        while true; do
          CURRENT_HOUR=$$(date +%H);
          if [ \"$$CURRENT_HOUR\" = \"01\" ] || [ \"$$CURRENT_HOUR\" = \"15\" ]; then
            do_backup;
            sleep 3000;
          fi
          sleep 60;
        done
      "

networks:
  m7-network:
    driver: bridge
  coolify:
    external: true

volumes:
  m7_logistica_data: null
  evolution_instances: null
  evolution_store: null
  m7_backups: null
