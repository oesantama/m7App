services:
  m7app-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: always
    environment:
      - PORT=8080
    volumes:
      - wwebjs_auth:/app/.wwebjs_auth
    networks:
      - m7-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: always
    depends_on:
      - m7app-backend
    networks:
      - m7-network

  evolution:
    image: atendai/evolution-api:v1.8.2
    container_name: m7-evolution
    restart: always
    environment:
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - SERVER_URL=${EVOLUTION_API_URL}
      - DOCKER_ENV=true
      - LOG_LEVEL=error
      - DEL_INSTANCE=false
      - STORE_MESSAGES=true
      - STORE_MESSAGE_UP=true
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    networks:
      - m7-network

  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=m7_admin
      - POSTGRES_PASSWORD=m7_master_password
      - POSTGRES_DB=m7_logistica
    volumes:
      - m7_logistica_data:/var/lib/postgresql/data
    networks:
      - m7-network

networks:
  m7-network:
    driver: bridge

volumes:
  m7_logistica_data:
  evolution_instances:
  evolution_store:
  wwebjs_auth:
