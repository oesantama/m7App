services:
  m7app-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: always
    expose:
      - '8080'
    environment:
      - PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - 'DB_USER=${POSTGRES_USER}'
      - 'DB_PASS=${POSTGRES_PASSWORD}'
      - 'DB_NAME=${POSTGRES_DB}'
      - NODE_ENV=production
      - 'GEMINI_API_KEY=${GEMINI_API_KEY}'
      - 'GOOGLE_API_KEY=${GOOGLE_API_KEY}'
      - 'AI_MODEL=${AI_MODEL}'
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 1g
    memswap_limit: 1g
    command: >
      sh -c "
        apk add --no-cache rclone;
        mkdir -p /config;
        cat <<EOF > /config/rclone.conf
        [gdrive_cumplidos]
        type = drive
        client_id = 410862023458-6ca0s3t1ao45ihl4mupodbvugg1gbufo.apps.googleusercontent.com
        client_secret = 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
        scope = drive
        token = {\"access_token\":\"ya29.a0AQvPyIPpsBRxEE8EnLi79gcuMGRL4A_gK3BHbxuowSsxEt2q6V9-hCnJmGhpx97gfQBT3_1K4WXS-QUoU7MBk09rp_zyfFJ0bsr8IG2mszF0qvXcfeQ0q51QVz0XRcCE3_BjHfr9Ufsbyj1XrYs0kfpMZj9q0bfWsku4Jik0-I__A19hb40NGKWZyZrwwLt4kn7_OwaCgYKAaSARQSFQHGX2MiHLPixjHeqVV88Sm-6WR9RQ0206\",\"token_type\":\"Bearer\",\"refresh_token\":\"1//05Eo38IaZetKLCgYIARAAGAUSNwF-L9IRHUPvwi78MEzb9K06mt52ITvS8PR5lZAd_Op9UL8eofrexl7ZMg3j0sqE34sozzxwTsE\"}
        EOF
        
        npm run start:server
      "

  frontend:
    image: 'ghcr.io/oesantama/m7-frontend:latest'
    pull_policy: always
    restart: always
    expose:
      - '80'
    depends_on:
      m7app-backend:
        condition: service_started
    mem_limit: 128m
    memswap_limit: 128m

  postgres:
    image: 'postgres:15-alpine'
    restart: always
    command: "postgres -c shared_buffers=512MB -c work_mem=8MB -c maintenance_work_mem=128MB -c max_connections=100 -c effective_cache_size=2GB -c checkpoint_completion_target=0.9 -c wal_buffers=16MB -c synchronous_commit=off -c max_parallel_workers_per_gather=2\n"
    environment:
      - 'POSTGRES_USER=${POSTGRES_USER}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD}'
      - 'POSTGRES_DB=${POSTGRES_DB}'
    volumes:
      - 'm7_logistica_data:/var/lib/postgresql/data'
      - './database/seed:/docker-entrypoint-initdb.d'
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}'
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: 1500m
    memswap_limit: 1500m

  db-backup:
    image: 'postgres:15-alpine'
    container_name: m7-backup
    restart: always
    environment:
      - 'PGPASSWORD=${POSTGRES_PASSWORD}'
      - 'POSTGRES_USER=${POSTGRES_USER}'
      - 'POSTGRES_DB=${POSTGRES_DB}'
      - TZ=America/Bogota
    volumes:
      - 'm7_backups:/backups'
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: >
      sh -c "
        apk add --no-cache rclone;
        mkdir -p /config;
        cat <<EOF > /config/rclone.conf
        [gdrive_cumplidos]
        type = drive
        client_id = 410862023458-6ca0s3t1ao45ihl4mupodbvugg1gbufo.apps.googleusercontent.com
        client_secret = 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
        scope = drive
        token = {\"access_token\":\"ya29.a0AQvPyIPpsBRxEE8EnLi79gcuMGRL4A_gK3BHbxuowSsxEt2q6V9-hCnJmGhpx97gfQBT3_1K4WXS-QUoU7MBk09rp_zyfFJ0bsr8IG2mszF0qvXcfeQ0q51QVz0XRcCE3_BjHfr9Ufsbyj1XrYs0kfpMZj9q0bfWsku4Jik0-I__A19hb40NGKWZyZrwwLt4kn7_OwaCgYKAaSARQSFQHGX2MiHLPixjHeqVV88Sm-6WR9RQ0206\",\"token_type\":\"Bearer\",\"refresh_token\":\"1//05Eo38IaZetKLCgYIARAAGAUSNwF-L9IRHUPvwi78MEzb9K06mt52ITvS8PR5lZAd_Op9UL8eofrexl7ZMg3j0sqE34sozzxwTsE\"}
        EOF
        
        do_backup() {
          BACKUP_FILE=/backups/m7_logistica_$$(date +%Y%m%d_%H%M%S).sql.gz;
          pg_dump -h postgres -U ${POSTGRES_USER} -d ${POSTGRES_DB} | gzip > $$BACKUP_FILE;
          rclone --config /config/rclone.conf copy $$BACKUP_FILE gdrive_cumplidos:m7_backups -v;
          find /backups -name '*.sql.gz' -mtime +3 -delete;
        }

        while true; do
          CURRENT_HOUR=$$(date +%H);
          if [ \"$$CURRENT_HOUR\" = \"01\" ] || [ \"$$CURRENT_HOUR\" = \"15\" ]; then
            do_backup;
            sleep 3000;
          fi
          sleep 60;
        done
      "

networks:
  m7-network:
    driver: bridge

volumes:
  m7_logistica_data: null
  evolution_instances: null
  evolution_store: null
  m7_backups: null
