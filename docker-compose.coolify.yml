services:
  m7app-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: always
    expose:
      - '8080'
    environment:
      - PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - 'DB_USER=${POSTGRES_USER}'
      - 'DB_PASS=${POSTGRES_PASSWORD}'
      - 'DB_NAME=${POSTGRES_DB}'
      - NODE_ENV=production
      - 'GEMINI_API_KEY=${GEMINI_API_KEY}'
      - 'GOOGLE_API_KEY=${GOOGLE_API_KEY}'
      - 'AI_MODEL=${AI_MODEL}'
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 1g
    memswap_limit: 1g
    entrypoint: >
      sh -c "
        mkdir -p /config;
        rm -rf /config/rclone.conf;
        echo '[gdrive]' > /config/rclone.conf;
        echo 'type = drive' >> /config/rclone.conf;
        echo 'scope = drive' >> /config/rclone.conf;
        echo 'token = {\"access_token\":\"ya29.a0AQvPyIOIpamab25CgGR9UxbuM22-EaKsOP148hP3wgsckvJm5AVXeE1ptPaO9_hUfxYvY1YH1nnGIze97vb4dRAFml7teZgNBuKeMa6GdJG98AEmY3rxQPS3J3jRVBp0_B2ioYbPzOJtlIBZHiqc8ozwF0gv2BWXJB50TdrnROINdGFRYnYxdggEnzSH2VU9-b_MAHUaCgYKAdISARcSFQHGX2MimFgoUmzftA5K3tCXwV3jdg0206\",\"token_type\":\"Bearer\",\"refresh_token\":\"1//05NEocypqb9wgCgYIARAAGAUSNwF-L9IrHzvKSUxrxbkccgx-9MegtC6VH084gqRiNcy18hH_pVLLRU0UVu-B8Pcx6eREnIqrL7M\",\"expiry\":\"2026-04-30T08:37:58.726474705-05:00\",\"expires_in\":3599}' >> /config/rclone.conf;
        
        echo '' >> /config/rclone.conf;
        echo '[gdrive_cumplidos]' >> /config/rclone.conf;
        echo 'type = drive' >> /config/rclone.conf;
        echo 'scope = drive' >> /config/rclone.conf;
        echo 'token = {\"access_token\":\"ya29.a0AQvPyIMibtr_L5oQ7mDxfRPu77bZFJ8GpkbkiU39EfKS80Wr26vdyM27IXzbbKgXb69YV4cYtNTLA2ZP1L6a4e5CJyW5LPKFPwS07Ras21HLJgn-p_U04IXKXqr7PIJnPMIgI272WA80doX_sF7RbtJAFAGjc26w_UF1n157WqfXuBtgXCEazeOvsepE1dhX1gwaCgYKAcOSARQSFQHGX2MixD8csWph3bFtMZBo16sKLQ0206\",\"token_type\":\"Bearer\",\"refresh_token\":\"1//0504LFCzrCgYIARAAGAUSNwF-L9IrapJvzJJCIDA6kz7wk2c9pIyEpqAniOBTUSf07c0rt9diSiUf7r0kYxsvPVjwSZ_P08o\",\"expiry\":\"2026-04-30T18:45:35.833988048-05:00\",\"expires_in\":3599}' >> /config/rclone.conf;
        node dist_backend/server.js;
      "

  frontend:
    image: 'ghcr.io/oesantama/m7-frontend:latest'
    pull_policy: always
    restart: always
    expose:
      - '80'
    depends_on:
      m7app-backend:
        condition: service_started
    mem_limit: 128m
    memswap_limit: 128m

  postgres:
    image: 'postgres:15-alpine'
    restart: always
    command: "postgres -c shared_buffers=512MB -c work_mem=8MB -c maintenance_work_mem=128MB -c max_connections=100 -c effective_cache_size=2GB -c checkpoint_completion_target=0.9 -c wal_buffers=16MB -c synchronous_commit=off -c max_parallel_workers_per_gather=2\n"
    environment:
      - 'POSTGRES_USER=${POSTGRES_USER}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD}'
      - 'POSTGRES_DB=${POSTGRES_DB}'
    volumes:
      - 'm7_logistica_data:/var/lib/postgresql/data'
      - './database/seed:/docker-entrypoint-initdb.d'
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}'
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: 1500m
    memswap_limit: 1500m

  db-backup:
    image: 'postgres:15-alpine'
    container_name: m7-backup
    restart: always
    environment:
      - 'PGPASSWORD=${POSTGRES_PASSWORD}'
      - 'POSTGRES_USER=${POSTGRES_USER}'
      - 'POSTGRES_DB=${POSTGRES_DB}'
      - TZ=America/Bogota
    volumes:
      - 'm7_backups:/backups'
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: >
      sh -c "
        apk add --no-cache rclone;
        mkdir -p /config;
        rm -rf /config/rclone.conf;
        echo '[gdrive]' > /config/rclone.conf;
        echo 'type = drive' >> /config/rclone.conf;
        echo 'scope = drive' >> /config/rclone.conf;
        echo 'token = {\"access_token\":\"ya29.a0AQvPyIOIpamab25CgGR9UxbuM22-EaKsOP148hP3wgsckvJm5AVXeE1ptPaO9_hUfxYvY1YH1nnGIze97vb4dRAFml7teZgNBuKeMa6GdJG98AEmY3rxQPS3J3jRVBp0_B2ioYbPzOJtlIBZHiqc8ozwF0gv2BWXJB50TdrnROINdGFRYnYxdggEnzSH2VU9-b_MAHUaCgYKAdISARcSFQHGX2MimFgoUmzftA5K3tCXwV3jdg0206\",\"token_type\":\"Bearer\",\"refresh_token\":\"1//05NEocypqb9wgCgYIARAAGAUSNwF-L9IrHzvKSUxrxbkccgx-9MegtC6VH084gqRiNcy18hH_pVLLRU0UVu-B8Pcx6eREnIqrL7M\",\"expiry\":\"2026-04-30T08:37:58.726474705-05:00\",\"expires_in\":3599}' >> /config/rclone.conf;
        
        echo '' >> /config/rclone.conf;
        echo '[gdrive_cumplidos]' >> /config/rclone.conf;
        echo 'type = drive' >> /config/rclone.conf;
        echo 'scope = drive' >> /config/rclone.conf;
        echo 'token = {\"access_token\":\"ya29.a0AQvPyIMibtr_L5oQ7mDxfRPu77bZFJ8GpkbkiU39EfKS80Wr26vdyM27IXzbbKgXb69YV4cYtNTLA2ZP1L6a4e5CJyW5LPKFPwS07Ras21HLJgn-p_U04IXKXqr7PIJnPMIgI272WA80doX_sF7RbtJAFAGjc26w_UF1n157WqfXuBtgXCEazeOvsepE1dhX1gwaCgYKAcOSARQSFQHGX2MixD8csWph3bFtMZBo16sKLQ0206\",\"token_type\":\"Bearer\",\"refresh_token\":\"1//0504LFCzrCgYIARAAGAUSNwF-L9IrapJvzJJCIDA6kz7wk2c9pIyEpqAniOBTUSf07c0rt9diSiUf7r0kYxsvPVjwSZ_P08o\",\"expiry\":\"2026-04-30T18:45:35.833988048-05:00\",\"expires_in\":3599}' >> /config/rclone.conf;
        
        do_backup() {
          BACKUP_FILE=/backups/m7_logistica_$$(date +%Y%m%d_%H%M%S).sql.gz;
          pg_dump -h postgres -U ${POSTGRES_USER} -d ${POSTGRES_DB} | gzip > $$BACKUP_FILE;
          rclone --config /config/rclone.conf copy $$BACKUP_FILE gdrive:m7_backups -v;
          find /backups -name '*.sql.gz' -mtime +3 -delete;
        }

        do_backup;
        while true; do
          CURRENT_HOUR=$$(date +%H);
          if [ \"$$CURRENT_HOUR\" = \"01\" ] || [ \"$$CURRENT_HOUR\" = \"15\" ]; then
            do_backup;
            sleep 3000;
          fi
          sleep 60;
        done
      "

networks:
  m7-network:
    driver: bridge

volumes:
  m7_logistica_data: null
  evolution_instances: null
  evolution_store: null
  m7_backups: null
