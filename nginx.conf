server {
    listen 80;
    server_tokens off;

    client_max_body_size 250M;
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    keepalive_requests  100;

    # Gzip — reduce ~70% el peso de JS/CSS en tránsito
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/rss+xml image/svg+xml application/wasm;

    # Assets con hash Vite (ej: index-CAXbAnvu.js) — inmutables, 1 año de cache
    # El navegador no vuelve a descargar los 4.2 MB mientras no cambie el hash
    location ~* /assets/.*\.[a-f0-9]+\.(js|css|woff2?|png|svg|ico)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    # Imágenes y fuentes sin hash: cache moderada 30 dias
    location ~* \.(png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # SPA — index.html NUNCA se cachea para que el PWA reciba deploys
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";
        add_header Server "M7-Intelligence/1.0" always;
    }

    # Docker DNS resolver — resuelve upstream casi en tiempo real (1s)
    # Esto previene que el frontend tire Error 504 cuando Coolify cambia la IP del backend en un deploy.
    resolver 127.0.0.11 valid=1s ipv6=off;

    # Proxy al Backend API
    location /api/ {
        set $backend http://m7app-backend:8080;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 5s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        proxy_buffer_size       128k;
        proxy_buffers           4 256k;
        proxy_busy_buffers_size 256k;
    }

    # Errores
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
